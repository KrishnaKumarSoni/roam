<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Roam · Wander the world's feeds</title>
  <meta name="description" content="Roam the planet's trending videos, country by country." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="grain"></div>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>

  <header class="bar">
    <a class="brand" href="/">
      <span class="brand-mark"><i class="ph-duotone ph-compass"></i></span>
      <span class="brand-name">Roam</span>
    </a>

    <div class="controls">
      <div class="region-picker">
        <button id="region-btn" class="region-btn" aria-haspopup="listbox" aria-expanded="false">
          <i class="ph ph-map-pin-line"></i>
          <span id="region-current">United States</span>
          <i class="ph ph-caret-down chev"></i>
        </button>
        <div id="region-menu" class="region-menu" role="listbox" hidden></div>
      </div>

      <div class="sort-seg" role="tablist" aria-label="Sort">
        <button class="seg-btn is-active" data-sort="trending" role="tab"><i class="ph ph-fire"></i><span>Trending</span></button>
        <button class="seg-btn" data-sort="newest" role="tab"><i class="ph ph-clock-countdown"></i><span>Newest</span></button>
        <span class="seg-thumb" aria-hidden="true"></span>
      </div>

      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
        <i class="ph-fill ph-sun ico-sun"></i>
        <i class="ph-fill ph-moon-stars ico-moon"></i>
      </button>
    </div>
  </header>

  <main>
    <section class="masthead">
      <div class="kicker">
        <span class="coord"><i class="ph ph-navigation-arrow"></i> Now roaming</span>
        <span class="rule"></span>
        <span id="region-code" class="region-code">US</span>
      </div>
      <h1 id="hero-title" class="display">United States</h1>
      <p id="hero-sub" class="hero-sub">The fifty most-watched videos in the country, right now.</p>
    </section>

    <nav id="catbar" class="catbar" aria-label="Categories">
      <button class="chip is-active" data-cat="0">All</button>
    </nav>

    <div id="status" class="status" hidden></div>

    <section id="featured" class="featured" aria-label="Top trending"></section>
    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <footer class="foot">
    <span class="foot-brand"><i class="ph-duotone ph-compass"></i> Roam</span>
    <span id="foot-meta" class="foot-meta">Wander the world's feeds.</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
