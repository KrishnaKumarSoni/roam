<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Roam · Trending videos by country</title>
  <meta name="description" content="Roam the world's trending videos, country by country." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="bar">
    <a class="brand" href="/">
      <span class="brand-mark"><i class="ph-duotone ph-compass"></i></span>
      <span class="brand-name">Roam</span>
    </a>

    <div class="controls">
      <div class="region-picker">
        <button id="region-btn" class="picker-btn" aria-haspopup="listbox" aria-expanded="false">
          <i class="ph ph-map-pin-line"></i>
          <span id="region-current">United States</span>
          <i class="ph ph-caret-down chev"></i>
        </button>
        <div id="region-menu" class="menu" role="listbox" hidden></div>
      </div>

      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
        <i class="ph-fill ph-sun ico-sun"></i>
        <i class="ph-fill ph-moon-stars ico-moon"></i>
      </button>
    </div>
  </header>

  <main>
    <section class="masthead">
      <p class="eyebrow"><i class="ph-fill ph-trend-up"></i> Trending now in</p>
      <h1 id="hero-title" class="title">United States</h1>
    </section>

    <div class="toolbar">
      <div class="cat-picker">
        <button id="cat-btn" class="picker-btn" aria-haspopup="listbox" aria-expanded="false">
          <i id="cat-icon" class="ph ph-squares-four"></i>
          <span id="cat-current">All categories</span>
          <i class="ph ph-caret-down chev"></i>
        </button>
        <div id="cat-menu" class="menu" role="listbox" hidden></div>
      </div>

      <div class="sort-picker">
        <button id="sort-btn" class="picker-btn" aria-haspopup="listbox" aria-expanded="false">
          <i class="ph ph-arrows-down-up"></i>
          <span id="sort-current">Trending</span>
          <i class="ph ph-caret-down chev"></i>
        </button>
        <div id="sort-menu" class="menu menu-right" role="listbox" hidden>
          <button class="menu-opt is-active" data-sort="trending">
            <div><span class="opt-name">Trending</span><span class="opt-desc">YouTube's chart order</span></div>
          </button>
          <button class="menu-opt" data-sort="views">
            <div><span class="opt-name">Most viewed</span><span class="opt-desc">Highest view count first</span></div>
          </button>
          <button class="menu-opt" data-sort="newest">
            <div><span class="opt-name">Newest</span><span class="opt-desc">Most recently uploaded</span></div>
          </button>
        </div>
      </div>
    </div>

    <div id="status" class="status" hidden></div>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <footer class="foot">
    <span class="foot-brand"><i class="ph-duotone ph-compass"></i> Roam</span>
    <span class="foot-meta">Wander the world's feeds.</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
